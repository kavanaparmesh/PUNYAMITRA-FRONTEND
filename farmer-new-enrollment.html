<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Enrollment</title>

<style>
/* RESET */
* {
  box-sizing: border-box;
}

/* BODY */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
  background: #f5f7fa;
  margin: 0;
}

/* TOP BAR */
.topbar {
  background: #2d8ac7;
  color: white;
  padding: 14px 16px;
  font-weight: 600;
  position: sticky;
  top: 0;
  z-index: 1000;
}

/* CONTAINER */
.container {
  padding: 16px;
  max-width: 1000px;
  margin: auto;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* TITLE */
.title {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.breadcrumb {
  font-size: 0.8rem;
  color: #6b7c8a;
  margin-bottom: 16px;
}

/* GRID */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 18px;
}

/* FORM */
.form-group {
  display: flex;
  flex-direction: column;
}

label {
  font-size: 0.85rem;
  margin-bottom: 5px;
  color: #2d3e4f;
}

/* INPUT FIX FOR iOS (prevents zoom) */
input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #dce3ea;
  font-size: 16px; /* IMPORTANT for iPhone zoom fix */
  background: white;
}

/* FOCUS */
input:focus, select:focus {
  outline: none;
  border-color: #2d8ac7;
}

/* FULL WIDTH */
.full {
  grid-column: span 2;
}

/* BUTTON */
button {
  width: 160px;
  margin-top: 20px;
  padding: 12px;
  border: none;
  background: #0b4f3c;
  color: white;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
}

button:active {
  transform: scale(0.97);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  .container {
    padding: 12px;
  }

  .card {
    padding: 14px;
    border-radius: 10px;
  }

  .form-grid {
    grid-template-columns: 1fr; /* SINGLE COLUMN */
    gap: 14px;
  }

  .full {
    grid-column: span 1;
  }

  button {
    width: 100%; /* FULL WIDTH BUTTON */
  }

  .title {
    font-size: 1.2rem;
  }
}

/* ================= SMALL DEVICES ================= */
@media (max-width: 400px) {
  .title {
    font-size: 1.1rem;
  }

  label {
    font-size: 0.8rem;
  }
}
</style>
</head>

<body>

<div class="topbar">PMF Dashboard</div>

<div class="container">
  <div class="title">New Enrollment</div>
  <div class="breadcrumb">Home - Enrollment - New Enrollment</div>

  <div class="card">
    <h3>Basic Details</h3>
<div id="successMsg" style="
  display:none;
  background:#d4edda;
  color:#155724;
  padding:12px;
  border-radius:8px;
  margin-bottom:10px;">
  Enrollment submitted successfully!
</div>

    <form id="enrollmentForm">
      <div class="form-grid">

        <div class="form-group">
          <label>Type of Document *</label>
          <select id="documentType">
            <option>Select Document</option>
            <option>Aadhar</option>
          </select>
        </div>

        <div class="form-group">
          <label>Farmer Aadhar Number *</label>
          <input type="text" placeholder="Farmer Aadhar Number" required>        </div>

        <div class="form-group">
          <label>Name *</label>
          <input type="text" placeholder="Name" required>        </div>

        <div class="form-group">
          <label>Form size *</label>
          <input type="text" placeholder="Farm size" required>        </div>

        <div class="form-group">
          <label>Crop Type *</label>
          <input type="text" placeholder="Crop Type">
        </div>

        <div class="form-group">
          <label>Gender *</label>
          <select id="gender">
            <option>Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <div class="form-group">
          <label>Date of Birth *</label>
          <input type="date">
        </div>

        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" id="mobile" placeholder="Phone" inputmode="numeric" required>
        </div>

        <div class="form-group">
          <label>Email *</label>
         <input type="email" placeholder="Email" required>        
        </div>

        <div class="form-group">
          <label>Registration Password *</label>
          <input type="password" id="farmerPassword" required placeholder="Enter registered password">
        </div>

        <div class="form-group">
          <label>Area *</label>
          <input type="text" id="area" required placeholder="Enter Area">
        </div>

        <div class="form-group">
          <label>Village/Town *</label>
          <input type="text" placeholder="Village/Town">
        </div>

        <div class="form-group">
          <label>State *</label>
          <input type="text" id="state" required placeholder="Enter State">
        </div>

        <div class="form-group">
          <label>District *</label>
          <input type="text" id="district" required placeholder="Enter District">
        </div>

        <div class="form-group full">
          <label>Area Pin Code *</label>
          <input type="text" placeholder="Area Pin Code">
        </div>

      </div>

<button type="submit" id="submitBtn">Submit</button>    </form>
  </div>
</div>

<script>
document.getElementById("enrollmentForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  // ✅ session check (same flow, fixed)
  const agentId = localStorage.getItem("agentId");

  if (!agentId) {
    alert("Please login again.");
    window.location.href = "farmer-login.html";
    return;
  }

  const currentFarmer = JSON.parse(localStorage.getItem("currentFarmer")) || {};

  const enteredPassword = document.getElementById("farmerPassword").value.trim();

  const aadhar = document.querySelector('input[placeholder="Farmer Aadhar Number"]').value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const email = document.querySelector('input[type="email"]').value.trim();

  const btn = document.getElementById("submitBtn");

  // ✅ Validation
  if (!/^\d{12}$/.test(aadhar)) {
    alert("Aadhar must be 12 digits");
    return;
  }

  if (!/^\d{10}$/.test(mobile)) {
    alert("Mobile must be 10 digits");
    return;
  }

  if (!/^\S+@\S+\.\S+$/.test(email)) {
    alert("Enter valid email");
    return;
  }

  const isValid = await verifyFarmerBeforeEnrollment();

  if (!isValid) {
    return;
  }

  // ✅ Loading state
  btn.innerText = "Submitting...";
  btn.disabled = true;

  // ✅ Collect all form values
  const formData = {
    farmerId: currentFarmer.farmerId || currentFarmer.phone || "",

    documentType: document.getElementById("documentType").value,
    aadhar: aadhar,
    fullname: document.querySelector('input[placeholder="Name"]').value,
    farmSize: document.querySelector('input[placeholder="Farm size"]').value,
    cropType: document.querySelector('input[placeholder="Crop Type"]').value,
    gender: document.getElementById("gender").value,
    dob: document.querySelector('input[type="date"]').value,

    mobile: mobile,
    email: email,
    password: enteredPassword,

    area: document.getElementById("area").value,
    village: document.querySelector('input[placeholder="Village/Town"]').value,
    state: document.getElementById("state").value,
    district: document.getElementById("district").value,
    pincode: document.querySelector('input[placeholder="Area Pin Code"]').value,

    status: "Pending",
    date: new Date().toLocaleString()
  };

  try {
   await fetch("https://punyamitra-backend.onrender.com/farmer-register", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    ...formData,
    agent_id: agentId
  })
});

    setTimeout(() => {
      document.getElementById("successMsg").style.display = "block";
      document.getElementById("enrollmentForm").reset();

      btn.innerText = "Submit";
      btn.disabled = false;

      window.location.href = "farmer-dashboard.html";
    }, 1200);

  } catch (error) {
    console.error("Enrollment save failed:", error);
    alert("Failed to save enrollment");
    btn.innerText = "Submit";
    btn.disabled = false;
  }
});

async function verifyFarmerBeforeEnrollment() {
  const mobile = document.getElementById("mobile").value.trim();
  const password = document.getElementById("farmerPassword").value.trim();
  const agentId = localStorage.getItem("agentId");

  try {
    const response = await fetch("https://punyamitra-backend.onrender.com/verify-farmer-password", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        mobile,
        password,
        agent_id: agentId
      })
    });

    const data = await response.json();

    if (!data.success) {
      alert("Verification failed");
      return false;
    }

    return true;

  } catch (error) {
    console.error("VERIFY ERROR:", error);
    alert("Verification failed");
    return false;
  }
}
</script>

</body>
</html>
