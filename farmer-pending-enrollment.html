<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pending Enrollment</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
  background: #f5f7fa;
  margin: 0;
}

/* TOPBAR */
.topbar {
  background: #2d8ac7;
  color: white;
  padding: 14px 16px;
  font-weight: 600;
}

/* CONTAINER */
.container {
  padding: 16px;
  max-width: 1100px;
  margin: auto;
}

/* TITLE */
.title {
  font-size: 1.3rem;
  font-weight: 600;
}

.breadcrumb {
  font-size: 0.8rem;
  color: #6b7c8a;
  margin-bottom: 16px;
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 16px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* TABLE CONTROLS */
.table-controls {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
  font-size: 0.85rem;
}

.table-controls input {
  padding: 6px;
  border: 1px solid #ccc;
  border-radius: 6px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

th {
  background: #f3f6f9;
  font-weight: 600;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 20px;
  color: #888;
}

/* PAGINATION */
.pagination {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 10px;
}

.pagination button {
  padding: 6px 10px;
  border: 1px solid #ccc;
  background: white;
  border-radius: 6px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  table {
    font-size: 0.8rem;
  }

  .table-controls {
    flex-direction: column;
    gap: 8px;
  }
}


</style>
</head>

<body>

<div class="topbar">PMF Dashboard</div>

<div class="container">

  <div class="title">Pending Enrollment</div>
  <div class="breadcrumb">Home - Enrollment - Pending Enrollment</div>

  <div class="card">

    <div class="table-controls">
      <div>Show 
        <select>
          <option>10</option>
          <option>25</option>
        </select> entries
      </div>

      <div>
        Search: <input type="text" id="searchInput" placeholder="Search...">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Acknowledgement No</th>
          <th>Student Name</th>
          <th>Mobile</th>
          <th>District</th>
          <th>Enroll Date</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="tableBody">
        <tr>
          <td colspan="7" class="empty">No data available in table</td>
        </tr>
      </tbody>
    </table>

    <div class="pagination">
      <button>Previous</button>
      <button>Next</button>
    </div>

  </div>
</div>

<script>
const tableBody = document.getElementById("tableBody");

function generateAck(index) {
  return "ACK" + (200000 + index);
}

async function loadPendingEnrollment() {
  try {
   const agentId = localStorage.getItem("agentId");

    const response = await fetch(`https://punyamitra-backend.onrender.com/farmer-dashboard-data/${agentId}`);
    const result = await response.json();

    const data = (result.farmers || []).filter(
    farmer => farmer.status === "Pending"
    );
    tableBody.innerHTML = "";

    if (!data.length) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="7" class="empty">No pending enrollments</td>
        </tr>
      `;
      return;
    }

    data.forEach((item, index) => {
      tableBody.innerHTML += `
        <tr>
          <td>${index + 1}</td>
          <td>${item.farmer_id || generateAck(index)}</td>
          <td>${item.name || "-"}</td>
          <td>${item.mobile || "-"}</td>
          <td>${item.district || "-"}</td>
          <td>${item.date || "-"}</td>
          <td>Pending</td>
        </tr>
      `;
    });

  } catch (error) {
    console.error("Failed to load pending enrollments:", error);
  }
}

loadPendingEnrollment();

document.getElementById("searchInput").addEventListener("keyup", function() {
  const value = this.value.toLowerCase();
  const rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
});
</script>

</body>
</html>
