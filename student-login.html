<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Punyamitra - Student Login</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<style>* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('student-login.avif') no-repeat center/cover;
}

.container {
    width: 100%;
    max-width: 500px;
    background: white;
    border-radius: 20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    overflow: hidden;
    animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}

.header {
    background: #f5f5f5;
    text-align: center;
    padding: 30px 20px;
    border-bottom: 1px solid #e0e0e0;
}

.logo {
    max-width: 80px;
    margin-bottom: 15px;
}

.header h1 {
    font-size: 1.8rem;
    color: #1b5e20;
    font-weight: 600;
}

.header p {
    color: #555;
    font-size: 0.9rem;
    margin-top: 5px;
}

.login-card {
    padding: 30px 25px;
}

.login-card h2 {
    text-align: center;
    color: #2e7d32;
    margin-bottom: 25px;
    font-weight: 500;
}

.input-group {
    margin-bottom: 20px;
    position: relative;
}

label {
    display: block;
    font-weight: 500;
    margin-bottom: 8px;
    color: #333;
}

input[type="text"],
input[type="password"] {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    transition: 0.2s;
}

input:focus {
    border-color: #2e7d32;
    outline: none;
    box-shadow: 0 0 0 3px rgba(46,125,50,0.2);
}

.toggle-password {
    position: absolute;
    right: 15px;
    top: 42px;
    cursor: pointer;
    user-select: none;
    font-size: 1.2rem;
}

.options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    font-size: 0.9rem;
}

.remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
}

.forgot-link {
    color: #2e7d32;
    text-decoration: none;
}

.forgot-link:hover {
    text-decoration: underline;
}

.login-btn {
    width: 100%;
    background: #2e7d32;
    color: white;
    border: none;
    padding: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.login-btn:hover {
    background: #1b5e20;
}

.register {
    text-align: center;
    margin-top: 20px;
    font-size: 0.9rem;
}

.register a {
    color: #2e7d32;
    text-decoration: none;
    font-weight: 500;
}

.register a:hover {
    text-decoration: underline;
}

footer {
    background: #f9f9f9;
    text-align: center;
    padding: 15px;
    font-size: 0.8rem;
    color: #777;
    border-top: 1px solid #eee;
}

footer a {
    color: #2e7d32;
    text-decoration: none;
}

footer a:hover {
    text-decoration: underline;
}

/* Responsive */
@media (max-width: 480px) {
    .container {
        max-width: 100%;
    }
    .login-card {
        padding: 20px;
    }
    .options {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }
}
</style>
<body>
    <div class="container">
        <!-- Header Section -->
        <div class="header">
            <img src="punyamitra.jpeg" alt="Punyamitra Logo" class="logo">
            <h1>Punyamitra Student Portal</h1>
            <p>Empowering Bright Future</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <h2>Student Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="studentId">Student ID / Registered Mobile No.</label>
                    <input type="text" id="studentId" name="studentId" placeholder="e.g., PM123456 or 9876543210" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>

                <div class="options">
                    <label class="remember">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div class="register">
                <p>New student? <a href="register.html">Register here</a></p>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>&copy; 2025 Punyamitra | <a href="#">Privacy Policy</a> | <a href="#">Help Desk</a></p>
        </footer>
    </div>

    <script id="q4n2f1">
// Toggle password visibility
function togglePassword() {
    const pwdField = document.getElementById('password');
    pwdField.type = pwdField.type === 'password' ? 'text' : 'password';
}

// Login button action
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const studentId = document.getElementById('studentId').value.trim();
    const password = document.getElementById('password').value.trim();

    if (!studentId || !password) {
        alert('Please fill in both fields.');
        return;
    }

    if (/^\\d+$/.test(studentId) && studentId.length !== 10) {
        alert('Mobile number must be 10 digits.');
        return;
    }

        const currentStudent = JSON.parse(localStorage.getItem("currentStudent")) || {};

        if (currentStudent.registeredAt) {
            const registeredAt = new Date(currentStudent.registeredAt);
            const today = new Date();

            const expiryDate = new Date(registeredAt);
            expiryDate.setFullYear(expiryDate.getFullYear() + 1);

            // ✅ only after 1 year block login
            if (today > expiryDate) {
                alert("Your student account expired. Please renew.");
                window.location.href = "student-renewal-enrollment.html";
                return;
            }
        }
try {
    const response = await fetch("https://api.punyamitra.org/api/auth/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: studentId,
            password: password
        })
    });

    const data = await response.json();

    if (data.success) {

        localStorage.setItem("token", data.token);
        localStorage.setItem("loggedInUser", JSON.stringify(data.user));

        window.location.href = "student-login-dashboard.html";

    } else {
        alert("Invalid login credentials");
    }

} catch (error) {
    console.error("Login error:", error);
    alert("Server error");
}
});
</script>
</body>
</html>
