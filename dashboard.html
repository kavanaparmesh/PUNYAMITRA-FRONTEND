<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    background:#f5f5f5;
}
.container{
    width:90%;
    margin:20px auto;
}
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
.cards{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
.card{
    background:white;
    padding:20px;
    border-radius:12px;
    flex:1;
    min-width:220px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
.agent-card{
    background:white;
    margin:10px 0;
    padding:15px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
button{
    margin:5px;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}
button:hover{
    opacity:0.9;
}
#details{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-top:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
#createForm{
    display:none;
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}
input{
    padding:10px;
    margin:8px;
    width:250px;
}
</style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <h1>Admin Dashboard</h1>
        <button onclick="showCreateForm()">+ Create Agent Login</button>
    </div>

    <div id="createForm">
        <h3>Create New Agent</h3>
        <input type="text" id="agentName" placeholder="Agent Name">
        <input type="email" id="agentEmail" placeholder="Agent Email">
        <button onclick="createAgent()">Create Agent</button>
    </div>

    <div class="cards">
    <div class="card">Total Agents: <span id="agentsCount">0</span></div>
    <div class="card">Total Students: <span id="studentsCount">0</span></div>
    <div class="card">Total Farmers: <span id="farmersCount">0</span></div>
    <button onclick="window.location.href='donation-history.html'">
   View Donation History
</button>
</div>

    <h2>Agent List</h2>
    <div id="agentList"></div>

    <div id="details"></div>
</div>

<script>
let currentAgentId = null;

function showCreateForm(){
    const form = document.getElementById("createForm");
    form.style.display = form.style.display === "block" ? "none" : "block";
}

async function createAgent() {
  const name = document.getElementById("agentName").value;
  const email = document.getElementById("agentEmail").value;

  const response = await fetch("https://punyamitra-backend.onrender.com/create-agent", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email })
  });

  const data = await response.json();

alert(
  `Agent created successfully\nID: ${data.agent.agent_id}\nPassword: ${data.agent.password}`
);

document.getElementById("agentName").value = "";
document.getElementById("agentEmail").value = "";

await loadDashboard();
showCreateForm();
}

async function loadDashboard() {
    const summary = await fetch("https://punyamitra-backend.onrender.com/dashboard-summary").then(r => r.json());

    document.getElementById('agentsCount').textContent = summary.totalAgents || 0;
    document.getElementById('studentsCount').textContent = summary.totalStudents || 0;
    document.getElementById('farmersCount').textContent = summary.totalFarmers || 0;

    const agents = await fetch("https://punyamitra-backend.onrender.com/agents").then(r => r.json());

    const list = document.getElementById('agentList');
    list.innerHTML = '';

    agents.forEach(agent => {
        const div = document.createElement('div');
        div.className = 'agent-card';

        div.innerHTML = `
            <b>${agent.name}</b> (${agent.agent_id}) - ${agent.status}<br>
            <button onclick="viewAgent('${agent.agent_id}')">View</button>
        `;

        list.appendChild(div);
    });
}

async function viewAgent(agentId) {
  currentAgentId = agentId;
  try {
    const response = await fetch(`https://punyamitra-backend.onrender.com/agent/${agentId}`);
    const data = await response.json();

    const details = document.getElementById("details");

    details.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:20px;">
        <div class="summary-card">
          <h3>Total Students</h3>
          <h2>${data.students.length}</h2>
        </div>
        <div class="summary-card">
          <h3>Total Farmers</h3>
          <h2>${data.farmers.length}</h2>
        </div>
      </div>

      <div class="agent-student-list">
        <h3>Students</h3>
        ${data.students.map(student => `
          <div class="record-card">
            <p><b>${student.fullname}</b></p>
            <p>${student.phone}</p>
            <p>Status: ${student.status || "Pending"}</p>
            ${student.status !== "Approved" ? `<button onclick="approveStudent('${student._id}')">Approve</button>` : ""}
            ${student.status !== "Rejected" ? `<button onclick="rejectStudent('${student._id}')">Reject</button>` : ""}
          </div>
        `).join("")}
      </div>
      <div class="agent-farmer-list" style="margin-top:20px;">
        <h3>Farmers</h3>
        ${data.farmers.map(farmer => `
          <div class="record-card">
            <p><b>${farmer.fullname}</b></p>
            <p>${farmer.phone}</p>
            <p>Status: ${farmer.status || "Pending"}</p>
            ${farmer.status !== "Approved" ? `<button onclick="approveFarmer('${farmer._id}')">Approve</button>` : ""}
            ${farmer.status !== "Rejected" ? `<button onclick="rejectFarmer('${farmer._id}')">Reject</button>` : ""}
          </div>
        `).join("")}
      </div>
    `;
  } catch (error) {
    console.error("View agent failed:", error);
  }
}

function updateEnrollmentStatus(studentId, newStatus) {
    let enrollments = JSON.parse(localStorage.getItem("studentEnrollments")) || [];

    enrollments = enrollments.map(item => {
        if (item.studentId === studentId) {
            item.status = newStatus;
        }
        return item;
    });

    localStorage.setItem("studentEnrollments", JSON.stringify(enrollments));
}

async function approveStudent(studentId) {
  await fetch(`https://punyamitra-backend.onrender.com/approve-student/${studentId}`, {
    method: "PUT"
  });

   alert("Student approved successfully");

  updateEnrollmentStatus(studentId, "Approved");

  alert("Student approved successfully");
  await loadDashboard();
  if (currentAgentId) {
    viewAgent(currentAgentId);
  }
}

async function rejectStudent(studentId) {
  await fetch(`https://punyamitra-backend.onrender.com/reject-student/${studentId}`, {
    method: "PUT"
  });

  updateEnrollmentStatus(studentId, "Rejected");

  alert("Student rejected successfully");
  await loadDashboard();
  if (currentAgentId) {
    viewAgent(currentAgentId);
  }
}

async function approveFarmer(farmerId) {
  await fetch(`https://punyamitra-backend.onrender.com/approve-farmer/${farmerId}`, {
    method: "PUT"
  });

   alert("Farmer approved successfully");


  updateEnrollmentStatus(farmerId, "Approved");

  await loadDashboard();
  if (currentAgentId) {
    viewAgent(currentAgentId);
  }
}
async function rejectFarmer(id) {
  await fetch(`https://punyamitra-backend.onrender.com/reject-farmer/${id}`, {
    method: "PUT" 
  });

  alert("Farmer rejected");

  updateEnrollmentStatus(farmerId, "Rejected");

  await loadDashboard();
  if (currentAgentId) {
    viewAgent(currentAgentId);
  }
}
loadDashboard();
</script>

</body>
</html>
