<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Renewal Enrollment</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f9;
  margin: 0;
}

.container {
  padding: 20px;
}

.card {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 20px;
}

.top-controls {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  margin-bottom: 15px;
  gap: 10px;
}

select, input {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.table-container {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}

th, td {
  padding: 10px;
  border: 1px solid #ddd;
  text-align: left;
}

th {
  background: #f1f1f1;
}

.btn {
  background: #2d8cf0;
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.table-footer {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  flex-wrap: wrap;
}

.pagination button {
  padding: 6px 12px;
  margin: 2px;
  border: none;
  background: #ddd;
  border-radius: 5px;
  cursor: pointer;
}

.pagination .active {
  background: #2d8cf0;
  color: white;
}

@media (max-width: 768px) {
  table {
    min-width: 100%;
  }

  thead {
    display: none;
  }

  tbody tr {
    display: block;
    background: #fff;
    margin-bottom: 12px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 1px 5px rgba(0,0,0,0.1);
  }

  tbody td {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border: none;
    border-bottom: 1px solid #eee;
  }

  tbody td:last-child {
    border-bottom: none;
  }

  tbody td::before {
    content: attr(data-label);
    font-weight: bold;
    color: #555;
  }

  .info-grid {
    grid-template-columns: 1fr;
  }
}

.profile-header {
  display: flex;
  gap: 15px;
  align-items: center;
  margin-bottom: 20px;
}

.profile-img {
  border-radius: 50%;
  width: 60px;
  height: 60px;
}

.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  margin-bottom: 20px;
}

.action-btns {
  margin-top: 20px;
}

.back-btn {
  background: #777;
}

button:disabled {
  background: #aaa;
  cursor: not-allowed;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <h2>Renewal Enrollment</h2>

    <div class="top-controls">
      <div>
        <label>Select Year</label><br>
        <select>
          <option>--Select year--</option>
          <option>2025</option>
          <option>2026</option>
        </select>
      </div>

      <div>
        <label>Search</label><br>
        <input type="text" placeholder="Search...">
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Acknowledgement No</th>
            <th>Student Name</th>
            <th>Mobile</th>
            <th>District</th>
            <th>Enroll Date</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="tableBody">
          <tr>
            <td colspan="7" class="empty">No renewal students</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="table-footer">
      <div>Showing renewal students</div>
      <div class="pagination">
        <button>Previous</button>
        <button class="active">1</button>
        <button>Next</button>
      </div>
    </div>
  </div>
</div>

<div id="detailsPage" style="display:none;">
  <div class="card">

    <div class="profile-header">
      <img src="https://via.placeholder.com/60" class="profile-img">
      <div>
        <h3>Student</h3>
        <p>Account No: -</p>
        <p>Enroll Date: -</p>
      </div>
    </div>

    <!-- ✅ REQUIRED FOR OLD LOGIC -->
    <div class="info-grid"></div>

    <h3 style="margin-top:25px;">Documents</h3>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Document Name</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="docTable">
          <tr>
            <td data-label="#">1</td>
            <td data-label="Document Name">Aadhar Card</td>
            <td data-label="Status">Uploaded</td>
            <td data-label="Action"><button class="btn">View</button></td>
          </tr>
          <tr>
            <td data-label="#">2</td>
            <td data-label="Document Name">Income Certificate</td>
            <td data-label="Status">Uploaded</td>
            <td data-label="Action"><button class="btn">View</button></td>
          </tr>
          <tr>
            <td data-label="#">3</td>
            <td data-label="Document Name">Bank Passbook</td>
            <td data-label="Status">Pending</td>
            <td data-label="Action"><button class="btn" disabled>Not Available</button></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="action-btns">
      <button class="btn">Virtual Card</button>
      <button class="btn">Renewal</button>
      <button class="btn back-btn" onclick="goBack()">Back</button>
    </div>

  </div>
</div>

<script>
const tableBody = document.getElementById("tableBody");
const agentId = localStorage.getItem("agentId");
let renewalStudents = [];

async function loadRenewalStudents() {
  try {
    const response = await fetch(`https://punyamitra-backend.onrender.com/student-dashboard-data/${agentId}`);
    const result = await response.json();

    renewalStudents = (result.students || []).filter(student => {
      if (student.status === "Renewal") return true;
      if (!student.registeredAt) return false;

      const regDate = new Date(student.registeredAt);
      const today = new Date();
      const diffDays = Math.floor((today - regDate) / (1000 * 60 * 60 * 24));

      return diffDays >= 365;
    });

    tableBody.innerHTML = "";

    if (!renewalStudents.length) {
      tableBody.innerHTML = `
        <tr>
          <td colspan="7" class="empty">No renewal students</td>
        </tr>
      `;
      return;
    }

    renewalStudents.forEach((item, index) => {
      tableBody.innerHTML += `
        <tr>
          <td data-label="#">${index + 1}</td>
          <td data-label="Acknowledgement No">${item.student_id || "REN" + (1000 + index)}</td>
          <td data-label="Student Name">${item.fullname || "-"}</td>
          <td data-label="Mobile">${item.phone || "-"}</td>
          <td data-label="District">${item.district || "-"}</td>
          <td data-label="Enroll Date">${item.registeredAt || "-"}</td>
          <td data-label="Action">
            <button class="btn" onclick="openDetails(${index})">Details</button>
          </td>
        </tr>
      `;
    });

  } catch (error) {
    console.error("Failed to load renewal students:", error);
  }
}

function openDetails(index) {
  const student = renewalStudents[index];
  if (!student) return;

  document.querySelector(".profile-header h3").innerText = student.fullname || "-";

  const profilePs = document.querySelectorAll(".profile-header p");
  profilePs[0].innerText = "Account No: " + (student.student_id || "-");
  profilePs[1].innerText = "Enroll Date: " + (student.registeredAt || "-");

  document.querySelector(".info-grid").innerHTML = `
    <div><b>Aadhar No</b><br>${student.aadhar || "-"}</div>
    <div><b>Student Name</b><br>${student.fullname || "-"}</div>
    <div><b>Father Name</b><br>${student.fatherName || "-"}</div>
    <div><b>Mother Name</b><br>${student.motherName || "-"}</div>
    <div><b>Gender</b><br>${student.gender || "-"}</div>
    <div><b>Date of Birth</b><br>${student.dob || "-"}</div>
    <div><b>School Name</b><br>${student.schoolName || "-"}</div>
    <div><b>Area Type</b><br>${student.areaType || "-"}</div>
    <div><b>Mobile</b><br>${student.phone || "-"}</div>
    <div><b>Email</b><br>${student.email || "-"}</div>
    <div><b>Village/Town</b><br>${student.village || "-"}</div>
    <div><b>Pin Code</b><br>${student.pincode || "-"}</div>
    <div><b>District</b><br>${student.district || "-"}</div>
    <div><b>State</b><br>${student.state || "-"}</div>
    <div><b>Application Status</b><br>${student.status || "-"}</div>
    <div><b>Agent Details</b><br>${student.agentName || "-"}</div>
  `;

  document.querySelector(".container").style.display = "none";
  document.getElementById("detailsPage").style.display = "block";
}

function goBack() {
  document.querySelector(".container").style.display = "block";
  document.getElementById("detailsPage").style.display = "none";
}

loadRenewalStudents();
</script>
</body>
</html>
