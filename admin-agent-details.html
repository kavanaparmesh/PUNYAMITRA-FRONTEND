<!DOCTYPE html>
<html>
<head>
  <title>Agent Details</title>
  <style>
    body{font-family:Arial;background:#f5f7fa;padding:20px}
    .card{background:white;padding:20px;border-radius:10px}
    table{width:100%;border-collapse:collapse;background:white;margin-top:20px}
    th,td{padding:12px;border-bottom:1px solid #ddd}
    th{background:#eef2f6}
  </style>
</head>
<body>

<h2>Agent Detailed View</h2>
<div class="card" id="summary"></div>

<table>
  <thead>
    <tr>
      <th>Students</th>
      <th>Farmers</th>
    </tr>
  </thead>
  <tbody id="agentDetailsBody"></tbody>
</table>

<button onclick="window.location.href='admin-master-dashboard.html'" 
style="padding:8px 16px;border:none;background:#2b95d6;color:white;border-radius:6px;cursor:pointer;margin-bottom:15px;">
⬅ Back to Dashboard
</button>

<script>
const API = "https://punyamitra-backend.onrender.com";
const agentId = localStorage.getItem("selectedAgentId");

async function loadAgentDetails() {
  const res = await fetch(`${API}/agent/${agentId}`);
  const data = await res.json();

  document.getElementById("summary").innerHTML = `
    <h3>Agent ID: ${agentId}</h3>
    <p>Total Students: ${data.students.length}</p>
    <p>Total Farmers: ${data.farmers.length}</p>
  `;

  document.getElementById("agentDetailsBody").innerHTML = `
    <tr>
      <td>${data.students.length}</td>
      <td>${data.farmers.length}</td>
    </tr>
  `;
}

setInterval(loadAgentDetails, 5000);
loadAgentDetails();
</script>

</body>
</html>
